<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- Central large leaf — oval tapered shape with central vein -->
  <path
    d="M 200,460 C 120,380 80,280 100,180 C 120,80 180,20 200,10 C 220,20 280,80 300,180 C 320,280 280,380 200,460 Z"
    stroke="#E07B39"
    stroke-opacity="0.35"
    stroke-width="1.5"
  />
  <!-- Central vein -->
  <line x1="200" y1="10" x2="200" y2="460" stroke="#E07B39" stroke-opacity="0.25" stroke-width="1" />
  <!-- Side veins left -->
  <path d="M 200,120 Q 155,130 140,150" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <path d="M 200,180 Q 148,195 130,220" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <path d="M 200,240 Q 145,258 128,288" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <path d="M 200,300 Q 152,320 142,350" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <!-- Side veins right -->
  <path d="M 200,120 Q 245,130 260,150" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <path d="M 200,180 Q 252,195 270,220" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <path d="M 200,240 Q 255,258 272,288" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />
  <path d="M 200,300 Q 248,320 258,350" stroke="#E07B39" stroke-opacity="0.2" stroke-width="1" />

  <!-- Smaller leaf top-left -->
  <path
    d="M 60,200 C 20,160 10,100 30,60 C 50,20 80,10 90,50 C 100,90 80,160 60,200 Z"
    stroke="#E07B39"
    stroke-opacity="0.28"
    stroke-width="1.2"
  />
  <line x1="65" y1="55" x2="62" y2="195" stroke="#E07B39" stroke-opacity="0.18" stroke-width="0.8" />

  <!-- Smaller leaf bottom-right -->
  <path
    d="M 340,300 C 380,260 395,200 375,160 C 355,120 325,115 318,155 C 310,195 325,265 340,300 Z"
    stroke="#E07B39"
    stroke-opacity="0.28"
    stroke-width="1.2"
  />
  <line x1="335" y1="158" x2="338" y2="298" stroke="#E07B39" stroke-opacity="0.18" stroke-width="0.8" />

  <!-- Thin curved stem/branch across bottom -->
  <path
    d="M 20,420 Q 80,390 140,410 Q 200,430 260,400 Q 320,370 390,390"
    stroke="#E07B39"
    stroke-opacity="0.22"
    stroke-width="1.2"
    fill="none"
  />

  <!-- Small decorative circle dots -->
  <circle cx="88" cy="48" r="3" fill="#E07B39" fill-opacity="0.2" />
  <circle cx="318" cy="153" r="3" fill="#E07B39" fill-opacity="0.2" />
  <circle cx="200" cy="8" r="3" fill="#E07B39" fill-opacity="0.2" />

</svg>
