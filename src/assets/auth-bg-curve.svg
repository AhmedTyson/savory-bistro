<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="soft-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="-3" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10" />
    </filter>
  </defs>
  <!-- Large organic blob that fills bottom-right, leaving orange top-left exposed -->
  <!-- Matches the reference: a big sweeping S-curve from top-right down to bottom-left -->
  <path
    d="M 100,0 L 100,100 L 0,100 L 0,48 C 8,44 18,38 28,28 C 42,14 52,0 100,0 Z"
    fill="#F5F0EB"
    filter="url(#soft-shadow)"
  />
</svg>
