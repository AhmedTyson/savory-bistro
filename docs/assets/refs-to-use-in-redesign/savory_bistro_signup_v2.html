
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#E07B39;--ph:#C96B2A;--bg:#F5F0EB;--w:#fff;
  --h:#1A1A1A;--m:#888;--bi:#D5CFC8;
  --fs:'Playfair Display',Georgia,serif;
  --fn:'Inter',sans-serif;
  --fsc:'Dancing Script',cursive;
}

.page{
  display:flex;width:100%;height:700px;
  border-radius:14px;overflow:hidden;
  box-shadow:0 16px 50px rgba(0,0,0,0.22);
  font-family:var(--fn);
}

/* ══ LEFT ══ */
.left{
  width:40%;position:relative;overflow:hidden;
  flex-shrink:0;background:#0d0d0d;
  display:flex;flex-direction:column;
}

/* Three stacked real-photo-like colour fields */
.slot{flex:1;position:relative;overflow:hidden}
.slot+.slot{border-top:1px solid rgba(255,255,255,0.08)}

/* Simulated food photography using rich colour gradients + shapes */
.s1{background:
  radial-gradient(ellipse 70% 60% at 55% 45%, #3d2000 0%, #1a0d00 55%, #0a0600 100%)}
.s2{background:
  radial-gradient(ellipse 80% 70% at 45% 55%, #0d2010 0%, #051208 60%, #020804 100%)}
.s3{background:
  radial-gradient(ellipse 75% 65% at 50% 50%, #251500 0%, #100a00 55%, #050300 100%)}

/* Warm colour overlay to simulate food warmth */
.s1::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 50% at 52% 48%,rgba(180,90,20,0.55),transparent 70%)}
.s2::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 55% at 48% 52%,rgba(160,110,40,0.45),transparent 70%)}
.s3::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 58% 52% at 50% 50%,rgba(140,70,10,0.5),transparent 70%)}

/* Bottom gradient on each slot to anchor badge */
.slot::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.7) 100%)}

/* Dish badge */
.badge{
  position:absolute;bottom:10px;left:12px;z-index:3;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  border-left:2px solid var(--p);
  padding:5px 10px;border-radius:0 4px 4px 0;
}
.badge-name{font-family:var(--fs);font-size:0.68rem;color:#fff;font-weight:700;line-height:1.2}
.badge-price{font-size:0.6rem;color:var(--p);font-weight:600;margin-top:1px}

/* POPULAR pill */
.pop{
  position:absolute;top:10px;right:10px;z-index:3;
  background:var(--p);color:#fff;
  font-size:0.55rem;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;padding:3px 8px;border-radius:20px;
}

/* Botanical leaf art on top of everything */
.leaf-art{position:absolute;inset:0;z-index:2;pointer-events:none;width:100%;height:100%}

/* Brand badge top-left */
.brand{
  position:absolute;top:14px;left:14px;z-index:10;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(224,123,57,0.4);
  border-radius:8px;padding:7px 11px;
  backdrop-filter:blur(6px);
}
.brand-name{font-family:var(--fs);font-size:0.75rem;color:#fff;font-weight:700}

/* ══ RIGHT ══ */
.right{
  flex:1;position:relative;overflow:hidden;
  background:var(--p);
}

/* Organic curve — cream fills lower-right */
.curve{position:absolute;inset:0;width:100%;height:100%}

/* Zigzags */
.zz{position:absolute;z-index:2}

/* Form sits directly on background — no white card boxing it */
.form-area{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 40px;
}

.form-inner{width:100%;max-width:380px}

/* Heading */
.pill{font-size:10px;font-weight:700;letter-spacing:0.14em;color:var(--p);text-transform:uppercase;margin-bottom:8px;display:block}
.heading{font-family:var(--fs);font-size:1.9rem;font-weight:700;color:var(--h);margin-bottom:5px;line-height:1.1}
.heading-script{font-family:var(--fsc);color:var(--p);font-size:1rem;margin-bottom:20px;display:block}
.hdivider{height:1px;background:rgba(26,26,26,0.12);margin-bottom:18px}

/* Fields */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg{margin-bottom:12px}
.lbl{display:block;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--m);margin-bottom:5px}
.inp{
  width:100%;height:44px;padding:0 14px;
  border:1.5px solid var(--bi);border-radius:8px;
  font-family:var(--fn);font-size:0.85rem;color:var(--h);
  background:rgba(255,255,255,0.92);outline:none;
  transition:border-color .2s;
}
.inp:focus{border-color:var(--p);background:#fff}
.inp::placeholder{color:#AAAAAA;font-size:0.8rem}

/* Submit */
.btn{
  width:100%;height:48px;background:var(--p);color:#fff;border:none;
  border-radius:8px;font-family:var(--fn);font-size:0.92rem;font-weight:600;
  cursor:pointer;margin-top:4px;letter-spacing:.02em;
  transition:background .2s;
}
.btn:hover{background:var(--ph)}

/* Bottom */
.tn{text-align:center;font-size:0.68rem;color:var(--m);margin-top:10px;line-height:1.5}
.tn span{color:var(--p);cursor:pointer}
.sw{text-align:center;margin-top:10px;font-size:0.8rem;color:var(--m)}
.sw span{color:var(--p);font-weight:600;cursor:pointer}
</style>

    <!-- Brand badge -->

    <!-- SLOT 1 — large top dish -->
